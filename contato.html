<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 border p-4 rounded shadow">
            <h2 class="text-center mb-4">Fale Comigo</h2>
            <form id="form-contato">
                <div class="mb-3">
                    <label class="form-label">Nome:</label>
                    <input type="text" id="nome" class="form-control" placeholder="Seu nome">
                </div>
                <div class="mb-3">
                    <label class="form-label">E-mail:</label>
                    <input type="email" id="email" class="form-control" placeholder="seu@email.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mensagem:</label>
                    <textarea id="mensagem" class="form-control" rows="4" placeholder="Escreva aqui..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100">Enviar Mensagem</button>
            </form>
        </div>
    </div>
</main>
